<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <title>WebXR 360° + Teleport</title>

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

    <!-- Teleport -->
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-teleport-controls/dist/aframe-teleport-controls.min.js"></script>

    <style>
      body { margin: 0; }
    </style>
  </head>

  <body>
    <a-scene
      renderer="antialias: true; physicallyCorrectLights: true; colorManagement: true"
      xr-mode-ui="enabled: true"
      shadow="type: pcfsoft"
      id="scene"
    >

      <!-- Boden -->
      <a-entity id="ground"
                geometry="primitive: plane; width: 30; height: 30"
                rotation="-90 0 0"
                material="color: #777; roughness: 1"
                shadow="receive: true"
                class="teleportable">
      </a-entity>

      <!-- Licht -->
      <a-entity light="type: directional; intensity: 1.2; castShadow: true"
                position="3 10 5">
      </a-entity>

      <a-entity light="type: ambient; intensity: 0.4"></a-entity>

      <!-- Beispielobjekte -->
      <a-box position="-2 0.5 -3"
             depth="1" height="1" width="1"
             color="#4CC3D9"
             shadow="cast: true">
      </a-box>

      <a-box position="2 0.5 -5"
             depth="1" height="1" width="1"
             color="#EF2D5E"
             shadow="cast: true">
      </a-box>

      <!-- Kamera + Teleport -->
      <a-entity id="rig" position="0 1.6 0">
        <a-entity camera look-controls wasd-controls></a-entity>

        <a-entity
          laser-controls="hand: right"
          teleport-controls="
            cameraRig: #rig;
            teleportOrigin: [camera];
            button: trigger;
            collisionEntities: .teleportable;
          ">
        </a-entity>
      </a-entity>

    </a-scene>

    <script>
      // Warten bis A-Frame fertig ist
      document.querySelector("a-scene").addEventListener("loaded", () => {
        const scene = document.querySelector("a-scene").object3D;

        // Sehr große Sky-Sphere (300 Meter)
        const geometry = new THREE.SphereGeometry(300, 64, 64);

        const loader = new THREE.TextureLoader();
        loader.load("skybox.jpg", (texture) => {
          texture.colorSpace = THREE.SRGBColorSpace;

          const material = new THREE.MeshBasicMaterial({
            map: texture,
            side: THREE.BackSide
          });
		  
          const sky = new THREE.Mesh(geometry, material);
          sky.position.set(0, 0, 0);
		  
		   sky.rotation.y = Math.PI;
		  
          scene.add(sky);
        });
      });
    </script>

  </body>
</html>
