<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <title>WebXR Teleport Test</title>
    <!-- A-Frame laden -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <!-- Teleport-Komponente -->
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-teleport-controls/dist/aframe-teleport-controls.min.js"></script>
    <style>
      body { margin: 0; }
    </style>
  </head>
  <body>
    <a-scene
      vr-mode-ui="enabled: true"
      renderer="antialias: true"
      background="color: #222"
    >
      <!-- Boden, auf dem man teleportieren darf -->
      <a-entity id="ground"
                geometry="primitive: plane; width: 20; height: 20"
                rotation="-90 0 0"
                material="color: #444; roughness: 1"
                class="teleportable">
      </a-entity>

      <!-- Ein paar Boxen als Orientierung -->
      <a-box position="-2 0.5 -3" depth="1" height="1" width="1" color="#4CC3D9"></a-box>
      <a-box position="2 0.5 -5" depth="1" height="1" width="1" color="#EF2D5E"></a-box>
      <a-box position="0 0.5 -8" depth="1" height="1" width="1" color="#7BC8A4"></a-box>

      <!-- Licht -->
      <a-entity light="type: directional; intensity: 0.8" position="1 3 2"></a-entity>
      <a-entity light="type: ambient; intensity: 0.4"></a-entity>

      <!-- Kamera + Teleport-Steuerung -->
      <a-entity id="rig" position="0 1.6 0">
        <a-entity
          camera
          look-controls
          wasd-controls
          position="0 0 0">
        </a-entity>

        <!-- Teleport-Controller (rechter Hand-Controller) -->
        <a-entity
          laser-controls="hand: right"
          teleport-controls="
            cameraRig: #rig;
            teleportOrigin: [camera];
            button: trigger;
            collisionEntities: .teleportable;
            curveShootingSpeed: 8;
          ">
        </a-entity>
      </a-entity>
    </a-scene>
  </body>
</html>
