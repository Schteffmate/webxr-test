<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <title>WebXR 360° + Teleport</title>

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

    <!-- Teleport -->
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-teleport-controls/dist/aframe-teleport-controls.min.js"></script>

    <style>
      body { margin: 0; }
    </style>
  </head>

  <body>
    <a-scene
      renderer="antialias: true; physicallyCorrectLights: true; colorManagement: true"
      xr-mode-ui="enabled: true"
      shadow="type: pcfsoft"
    >

      <!-- 360° Panorama -->
      <a-sky src="studio.jpg" rotation="0 -90 0"></a-sky>

      <!-- Boden für Teleport -->
      <a-entity id="ground"
                geometry="primitive: plane; width: 30; height: 30"
                rotation="-90 0 0"
                material="color: #777; roughness: 1"
                shadow="receive: true"
                class="teleportable">
      </a-entity>

      <!-- Licht -->
      <a-entity light="type: directional; intensity: 1.2; castShadow: true"
                position="3 10 5">
      </a-entity>

      <a-entity light="type: ambient; intensity: 0.4"></a-entity>

      <!-- Beispielobjekte mit Schatten -->
      <a-box position="-2 0.5 -3"
             depth="1" height="1" width="1"
             color="#4CC3D9"
             shadow="cast: true">
      </a-box>

      <a-box position="2 0.5 -5"
             depth="1" height="1" width="1"
             color="#EF2D5E"
             shadow="cast: true">
      </a-box>

      <!-- Kamera + Teleport -->
      <a-entity id="rig" position="0 1.6 0">
        <a-entity camera look-controls wasd-controls></a-entity>

        <a-entity
          laser-controls="hand: right"
          teleport-controls="
            cameraRig: #rig;
            teleportOrigin: [camera];
            button: trigger;
            collisionEntities: .teleportable;
          ">
        </a-entity>
      </a-entity>

    </a-scene>
  </body>
</html>
